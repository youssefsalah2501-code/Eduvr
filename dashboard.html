<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduVR · Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040812;
  --surface:#080f1e;
  --surface2:#0d1829;
  --border:rgba(0,200,255,0.15);
  --accent:#00c8ff;
  --accent2:#7b2fff;
  --text:#e0f0ff;
  --muted:#4a6a8a;
  --good:#00ff88;
  --ok:#ffb800;
  --low:#ff3a5c;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

/* scanline overlay */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:0;
}

/* grid bg */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

header{
  position:relative;z-index:10;
  background:rgba(4,8,18,0.95);
  border-bottom:1px solid var(--border);
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
}

.logo{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;
  letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:11px;letter-spacing:4px;color:var(--muted);font-family:'Rajdhani',sans-serif;margin-top:2px}

.header-right{display:flex;align-items:center;gap:10px}
.updated{font-size:12px;color:var(--muted);letter-spacing:1px;font-family:'Orbitron',sans-serif}

.btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:4px;
  padding:8px 16px;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--accent);
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
  transition:all .2s;
  position:relative;overflow:hidden;
}
.btn::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .2s}
.btn:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(0,200,255,0.3)}
.btn:hover::before{opacity:0.08}
.btn-clear{border-color:rgba(255,58,92,0.3);color:var(--low)}
.btn-clear:hover{border-color:var(--low);box-shadow:0 0 12px rgba(255,58,92,0.3)}
.btn-clear::before{background:var(--low)}

.container{max-width:1100px;margin:0 auto;padding:32px 20px 80px;position:relative;z-index:1}

.section-label{
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;
  text-transform:uppercase;color:var(--accent);margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:22px 20px;
  position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.stat::after{
  content:'';position:absolute;bottom:0;right:0;
  width:60px;height:60px;
  background:radial-gradient(circle,rgba(0,200,255,0.06),transparent 70%);
}
.stat-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-family:'Orbitron',sans-serif}
.stat-value{font-family:'Orbitron',sans-serif;font-weight:700;font-size:32px;line-height:1}
.stat-value.good{color:var(--good);text-shadow:0 0 20px rgba(0,255,136,0.4)}
.stat-value.ok{color:var(--ok);text-shadow:0 0 20px rgba(255,184,0,0.4)}
.stat-value.low{color:var(--low);text-shadow:0 0 20px rgba(255,58,92,0.4)}
.stat-value.neutral{color:var(--accent);text-shadow:0 0 20px rgba(0,200,255,0.4)}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  margin-bottom:24px;
  position:relative;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.card-title{
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--accent);
  padding:14px 20px;border-bottom:1px solid var(--border);
  background:rgba(0,200,255,0.03);
}

table{width:100%;border-collapse:collapse}
th{
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);
  text-align:left;padding:10px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2);
}
td{padding:14px 20px;font-size:15px;border-bottom:1px solid rgba(0,200,255,0.06);font-family:'Rajdhani',sans-serif;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,200,255,0.04)}

.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;font-family:'Orbitron',sans-serif;letter-spacing:1px}
.badge.good{background:rgba(0,255,136,0.1);color:var(--good);border:1px solid rgba(0,255,136,0.2)}
.badge.ok{background:rgba(255,184,0,0.1);color:var(--ok);border:1px solid rgba(255,184,0,0.2)}
.badge.low{background:rgba(255,58,92,0.1);color:var(--low);border:1px solid rgba(255,58,92,0.2)}

.feedback-pill{display:inline-block;font-size:12px;font-weight:600;padding:3px 12px;border-radius:3px;letter-spacing:1px}
.feedback-pill.good{background:rgba(0,255,136,0.08);color:var(--good)}
.feedback-pill.ok{background:rgba(255,184,0,0.08);color:var(--ok)}
.feedback-pill.low{background:rgba(255,58,92,0.08);color:var(--low)}

.rank-num{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--muted)}
.rank-num.gold{color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5)}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;letter-spacing:2px;font-family:'Orbitron',sans-serif}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:12px;letter-spacing:3px;font-family:'Orbitron',sans-serif}
.spinner{width:32px;height:32px;border:2px solid rgba(0,200,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;box-shadow:0 0 10px rgba(0,200,255,0.3)}
@keyframes spin{to{transform:rotate(360deg)}}

.confirm-box{
  display:none;
  background:rgba(255,58,92,0.05);
  border:1px solid rgba(255,58,92,0.2);
  border-radius:8px;padding:14px 20px;margin-bottom:20px;
  align-items:center;gap:12px;flex-wrap:wrap;
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;
}
.confirm-box.show{display:flex}

@media(max-width:600px){.stat-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">EduVR</div>
    <div class="logo-sub">Mission Control · Results</div>
  </div>
  <div class="header-right">
    <span class="updated" id="last-updated"></span>
    <button class="btn" onclick="loadData()">↺ Refresh</button>
    <button class="btn btn-clear" onclick="askClear()">✕ Clear</button>
  </div>
</header>

<div class="container">

  <div class="confirm-box" id="confirm-box">
    <span style="color:var(--low)">Delete all results?</span>
    <span style="color:var(--muted);font-size:10px">This cannot be undone.</span>
    <button class="btn btn-clear" onclick="confirmClear()">Confirm</button>
    <button class="btn" onclick="cancelClear()">Cancel</button>
  </div>

  <div class="section-label">Overview</div>
  <div class="stat-row">
    <div class="stat">
      <div class="stat-label">Players</div>
      <div class="stat-value neutral" id="s-count">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Average score</div>
      <div class="stat-value" id="s-avg">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Top score</div>
      <div class="stat-value good" id="s-top">—</div>
    </div>
  </div>

  <div class="section-label">Score chart</div>
  <div class="card">
    <div class="card-title">Score per player</div>
    <div style="padding:24px;height:300px">
      <canvas id="bar-chart"></canvas>
    </div>
  </div>

  <div class="section-label">Leaderboard</div>
  <div class="card">
    <div class="card-title">Player results</div>
    <div id="table-area">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzthJfAk3pLpVMqYiI4O-Tl1xlNYGXRVxM7EvDiRorDasR08Wd4ZrXRXYnuvekjvdiF/exec";
const MAX_SCORE = 7;

function getFeedback(pct){
  if(pct>=86) return {text:"Excellent !",  cls:"good"};
  if(pct>=71) return {text:"Very good !",  cls:"good"};
  if(pct>=57) return {text:"Good !",       cls:"ok"};
  if(pct>=43) return {text:"Try harder !", cls:"ok"};
  return             {text:"Replay !",     cls:"low"};
}
function scoreClass(pct){return pct>=75?'good':pct>=50?'ok':'low'}
function rankClass(i){return i===0?'gold':i===1?'silver':i===2?'bronze':''}

async function loadData(){
  document.getElementById('table-area').innerHTML='<div class="loading"><div class="spinner"></div>Loading…</div>';
  try{
    const res  = await fetch(APPS_SCRIPT_URL+"?action=get");
    const data = await res.json();
    render(data);
  }catch(e){
    document.getElementById('table-area').innerHTML='<div class="empty">Connection failed</div>';
  }
}

function render(data){
  if(!data||!data.length){
    document.getElementById('table-area').innerHTML='<div class="empty">No data yet — play the game!</div>';
    renderStats([]);renderChart([]);return;
  }
  renderStats(data);
  renderChart(data);

  const sorted=[...data].sort((a,b)=>b.score-a.score);
  const rows=sorted.map((p,i)=>{
    const pct=Math.round((p.score/MAX_SCORE)*100);
    const cls=scoreClass(pct);
    const fb=getFeedback(pct);
    const rc=rankClass(i);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return`<tr>
      <td><span class="rank-num ${rc}">${medal||('#'+(i+1))}</span></td>
      <td>
        <span style="display:inline-flex;gap:4px;vertical-align:middle;margin-right:10px">
          ${Array.from({length:MAX_SCORE},(_,k)=>`<span style="width:20px;height:16px;border-radius:3px;background:${k<p.score?(pct>=75?'var(--good)':pct>=50?'var(--ok)':'var(--low)'):'rgba(255,255,255,0.06)'};box-shadow:${k<p.score?'0 0 6px '+(pct>=75?'rgba(0,255,136,0.4)':pct>=50?'rgba(255,184,0,0.4)':'rgba(255,58,92,0.4)'):'none'}"></span>`).join('')}
        </span>
        <span style="font-family:'Orbitron',sans-serif;font-size:13px">${p.score}<span style="color:var(--muted);font-size:11px">/${MAX_SCORE}</span></span>
      </td>
      <td><span class="badge ${cls}">${pct}%</span></td>
      <td><span class="feedback-pill ${fb.cls}">${fb.text}</span></td>
      <td style="color:var(--muted);font-size:13px;font-family:'Rajdhani',sans-serif">${p.date||''}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-area').innerHTML=`
    <table>
      <thead><tr>
        <th style="width:50px">Rank</th>
        <th>Score</th><th>Result</th><th>Feedback</th><th>Date</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  document.getElementById('last-updated').textContent=
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function renderStats(data){
  const n=data.length;
  document.getElementById('s-count').textContent=n;
  if(!n){document.getElementById('s-avg').textContent='—';document.getElementById('s-top').textContent='—';return;}
  const avg=Math.round(data.reduce((s,p)=>s+p.score,0)/n);
  const top=Math.max(...data.map(p=>p.score));
  const avgPct=Math.round(avg/MAX_SCORE*100);
  const el=document.getElementById('s-avg');
  el.textContent=avg+'/'+MAX_SCORE;
  el.className='stat-value '+scoreClass(avgPct);
  document.getElementById('s-top').textContent=top+'/'+MAX_SCORE;
}

function renderChart(data){
  if(window._barChart) window._barChart.destroy();
  const canvas=document.getElementById('bar-chart');
  if(!data||!data.length) return;

  const sorted=[...data].sort((a,b)=>a.score-b.score);
  const labels=sorted.map((_,i)=>'P'+(i+1));
  const scores=sorted.map(p=>p.score);
  const colors=scores.map(s=>{
    const pct=Math.round((s/MAX_SCORE)*100);
    return pct>=75?'rgba(0,255,136,0.8)':pct>=50?'rgba(255,184,0,0.8)':'rgba(255,58,92,0.8)';
  });
  const glows=scores.map(s=>{
    const pct=Math.round((s/MAX_SCORE)*100);
    return pct>=75?'rgba(0,255,136,0.15)':pct>=50?'rgba(255,184,0,0.15)':'rgba(255,58,92,0.15)';
  });

  Chart.defaults.color='#4a6a8a';
  Chart.defaults.font.family='Orbitron, sans-serif';

  window._barChart=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        data:scores,
        backgroundColor:colors,
        borderColor:colors,
        borderWidth:1,
        borderRadius:4,
        borderSkipped:false,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(8,15,30,0.95)',
          borderColor:'rgba(0,200,255,0.3)',
          borderWidth:1,
          titleColor:'#00c8ff',
          bodyColor:'#e0f0ff',
          padding:10,
          callbacks:{label:ctx=>` Score: ${ctx.raw}/${MAX_SCORE}`}
        },
      },
      scales:{
        y:{
          min:0,max:MAX_SCORE,
          ticks:{stepSize:1,color:'#4a6a8a',font:{size:10}},
          grid:{color:'rgba(0,200,255,0.05)'},
          border:{color:'rgba(0,200,255,0.1)'}
        },
        x:{
          ticks:{color:'#4a6a8a',font:{size:10}},
          grid:{display:false},
          border:{color:'rgba(0,200,255,0.1)'}
        }
      }
    },
    plugins:[{
      id:'insideLabel',
      afterDatasetsDraw(chart){
        const {ctx,data}=chart;
        chart.getDatasetMeta(0).data.forEach((bar,i)=>{
          const score=data.datasets[0].data[i];
          const label=`${score}/${MAX_SCORE}`;
          const barH=bar.base-bar.y;
          if(barH<28) return;
          ctx.save();
          ctx.font='bold 13px Orbitron, sans-serif';
          ctx.fillStyle='rgba(255,255,255,0.9)';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.fillText(label, bar.x, bar.y+barH/2);
          ctx.restore();
        });
      }
    }]
  });
}

function askClear(){document.getElementById('confirm-box').classList.add('show')}
function cancelClear(){document.getElementById('confirm-box').classList.remove('show')}
async function confirmClear(){
  cancelClear();
  document.getElementById('table-area').innerHTML='<div class="loading"><div class="spinner"></div>Clearing…</div>';
  try{
    await fetch(APPS_SCRIPT_URL+"?action=clear");
    await loadData();
  }catch(e){
    document.getElementById('table-area').innerHTML='<div class="empty">Failed to clear</div>';
  }
}

loadData();
</script>
</body>
</html>
